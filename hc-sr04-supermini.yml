substitutions:
  device_name: esp32-hcsr04-01
  device_friendly_name: "Garage Distance Sensor 01"

esphome:
  name: ${device_name}
  friendly_name: ${device_friendly_name}
  on_boot:
    priority: -10
    then:
      - logger.log:
          level: INFO
          tag: hcsr04
          format: "Startuji mereni HC-SR04: TRIG=GPIO4, ECHO=GPIO5 pres delic 5k/10k, timeout=4 m"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: info
  # logs:
  #   sensor: debug
  #   ultrasonic.sensor: debug

ota:
  - platform: esphome
    password: !secret esp32-hcsr04-01_pass

api:
  encryption:
    key: !secret esp32-hcsr04-01
  reboot_timeout: 0s

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_passwd
  ap:
    ssid: "${device_name} Fallback"
    password: "hcsr04-setup"

captive_portal:

# Zapojeni pro ESP32-C3 SuperMini:
# HC-SR04 VCC  -> 5V/VBUS na ESP32 desce
# HC-SR04 GND  -> GND
# HC-SR04 TRIG -> GPIO4
# HC-SR04 ECHO -> GPIO5 pres odporovy delic 5 V -> 3.3 V
# Delic: ECHO -- 5 kOhm -- GPIO5/node -- 10 kOhm -- GND
# Kontrola multimetrem bez napajeni: ECHO-GPIO5 cca 5 kOhm, GPIO5-GND cca 10 kOhm, ECHO-GND cca 15 kOhm.
button:
  - platform: restart
    name: "Restart"

sensor:
  - platform: ultrasonic
    id: distance_m
    name: "Vzdalenost"
    trigger_pin: GPIO4
    echo_pin: GPIO5
    pulse_time: 10us
    timeout: 3m
    update_interval: 2s
    unit_of_measurement: "m"
    device_class: distance
    state_class: measurement
    accuracy_decimals: 3
    filters:
      - filter_out: nan
      - clamp:
          min_value: 0.02
          max_value: 3.0
      - median:
          window_size: 5
          send_every: 1
          send_first_at: 1
    on_raw_value:
      then:
        - lambda: |-
            if (isnan(x)) {
              ESP_LOGW("hcsr04", "RAW=NAN - neprisla odezva na ECHO GPIO5. Zkontroluj GND, napajeni 5 V, delic ECHO-5k-GPIO5-10k-GND a prohozeni TRIG/ECHO.");
            } else {
              ESP_LOGD("hcsr04", "RAW=%.3f m / %.1f cm", x, x * 100.0f);
            }
    on_value:
      then:
        - lambda: |-
            ESP_LOGI("hcsr04", "Publikuji filtrovanou vzdalenost %.3f m / %.1f cm", x, x * 100.0f);
        - component.update: distance_cm

  - platform: template
    id: distance_cm
    name: "Vzdalenost cm"
    unit_of_measurement: "cm"
    device_class: distance
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    lambda: |-
      if (isnan(id(distance_m).state)) {
        ESP_LOGW("hcsr04", "Vzdalenost cm=NAN, protoze distance_m zatim nema platnou hodnotu");
        return NAN;
      }
      float distance_cm = id(distance_m).state * 100.0f;
      ESP_LOGD("hcsr04", "Prepocet %.3f m -> %.1f cm", id(distance_m).state, distance_cm);
      return distance_cm;

  - platform: wifi_signal
    name: "WiFi signal"
    update_interval: 30s

  - platform: uptime
    name: "Uptime"
    update_interval: 30s
